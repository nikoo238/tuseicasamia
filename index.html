<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>I Love You ❤</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: radial-gradient(ellipse at 50% 40%, #1a0015 0%, #0a0008 70%, #030002 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: Georgia, serif;
    }

    #wrapper {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
    }

    #hc {
      display: block;
      animation: heartbeat 1.8s ease-in-out infinite;
      position: relative;
      z-index: 2;
      max-width: 95vw;
      height: auto;
    }

    #pc {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    #bottom-area {
      position: relative;
      z-index: 3;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      margin-top: 8px;
    }

    #caption {
      white-space: nowrap;
      font-family: 'Palatino Linotype', Palatino, 'Book Antiqua', Georgia, serif;
      font-style: italic;
      font-size: 17px;
      font-weight: 400;
      letter-spacing: 2px;
      background: linear-gradient(90deg, #ff6ea8, #ffb3d1, #ff4d8d, #ffaacc, #ff6ea8);
      background-size: 300% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: textshine 4s linear infinite, fadeInUp 2s ease forwards;
      opacity: 0;
      filter: drop-shadow(0 0 8px rgba(255, 100, 160, 0.45));
    }

    #photo-btn {
      background: transparent;
      border: 1px solid rgba(255, 110, 168, 0.45);
      border-radius: 50px;
      padding: 9px 26px;
      font-family: 'Palatino Linotype', Palatino, Georgia, serif;
      font-style: italic;
      font-size: 13px;
      letter-spacing: 1.8px;
      color: rgba(255, 180, 210, 0.85);
      cursor: pointer;
      animation: fadeInUp 2.5s ease forwards;
      opacity: 0;
      transition: background 0.3s, border-color 0.3s, color 0.3s, box-shadow 0.3s;
      -webkit-tap-highlight-color: transparent;
    }

    #photo-btn:hover, #photo-btn:active {
      background: rgba(255, 80, 140, 0.12);
      border-color: rgba(255, 110, 168, 0.85);
      color: #ffb3d1;
      box-shadow: 0 0 18px rgba(255, 80, 140, 0.3);
    }

    /* ── Modal ── */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(5, 0, 8, 0.88);
      align-items: center;
      justify-content: center;
      animation: none;
    }
    #modal-overlay.open {
      display: flex;
      animation: overlayIn 0.35s ease forwards;
    }

    #modal-box {
      position: relative;
      border-radius: 20px;
      overflow: hidden;
      max-width: 88vw;
      max-height: 82vh;
      box-shadow: 0 0 60px rgba(255, 80, 140, 0.35), 0 0 120px rgba(180, 30, 100, 0.18);
      animation: modalIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      border: 1px solid rgba(255, 110, 168, 0.3);
    }

    #modal-box img {
      display: block;
      width: 100%;
      height: 100%;
      max-width: 80vw;
      max-height: 78vh;
      object-fit: cover;
    }

    #modal-close {
      position: absolute;
      top: 12px; right: 14px;
      background: rgba(10, 0, 12, 0.65);
      border: 1px solid rgba(255, 110, 168, 0.4);
      border-radius: 50%;
      width: 34px; height: 34px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: #ffb3d1;
      font-size: 16px;
      transition: background 0.2s, transform 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    #modal-close:hover { background: rgba(255,80,140,0.25); transform: scale(1.1); }

    @keyframes overlayIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.75); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes textshine {
      0%   { background-position: 0% center; }
      100% { background-position: 300% center; }
    }
    @keyframes fadeInUp {
      0%   { opacity: 0; transform: translateY(14px); }
      100% { opacity: 1; transform: translateY(0px); }
    }
    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      14%       { transform: scale(1.07); }
      28%       { transform: scale(1); }
      42%       { transform: scale(1.04); }
      56%       { transform: scale(1); }
    }

    @media (max-width: 480px) {
      #caption { font-size: 14px; letter-spacing: 1.4px; }
      #photo-btn { font-size: 12px; padding: 8px 22px; }
    }
  </style>
</head>

  <script>
    function openModal() {
      document.getElementById('modal-overlay').classList.add('open');
    }
    function closeModal(e) {
      if (!e || e.target === document.getElementById('modal-overlay') || e.currentTarget === document.getElementById('modal-close')) {
        document.getElementById('modal-overlay').classList.remove('open');
      }
    }
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal({}); });

    /* ── Heart canvas ── */
    const hc  = document.getElementById('hc');
    const ctx = hc.getContext('2d');
    const W = 520, H = 500;
    hc.width  = W;
    hc.height = H;

    function isInHeart(px, py) {
      const nx =  (px - W / 2)             / (W * 0.38);
      const ny = -(py - H / 2 - H * 0.04) / (H * 0.37);
      const val = Math.pow(nx*nx + ny*ny - 1, 3) - nx*nx * Math.pow(ny, 3);
      return val <= 0;
    }

    const phrase = "I love you ";
    let pIdx = 0;
    const fontSize = 8.5, colW = 7.8, rowH = 11;
    const cols = Math.floor(W / colW);
    const rows = Math.floor(H / rowH);
    const cells = [];

    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const cx = c * colW + colW / 2;
        const cy = r * rowH + rowH / 2;
        if (isInHeart(cx, cy)) {
          const ch = phrase[pIdx % phrase.length];
          pIdx++;
          cells.push({ x: cx, y: cy + fontSize * 0.35, ch: ch === ' ' ? '' : ch, r, c });
        }
      }
    }

    let tick = 0;
    function drawHeart() {
      ctx.clearRect(0, 0, W, H);
      ctx.font = `bold ${fontSize}px Georgia, serif`;
      ctx.textAlign = 'center';
      cells.forEach(({ x, y, ch, r, c }) => {
        if (!ch) return;
        const wave  = Math.sin(tick * 0.05 + c * 0.22 + r * 0.18);
        const hue   = 330 + wave * 30;
        const sat   = 85  + wave * 10;
        const light = 62  + wave * 18;
        const alpha = 0.75 + wave * 0.25;
        ctx.fillStyle   = `hsla(${hue}, ${sat}%, ${light}%, ${alpha})`;
        ctx.shadowBlur  = 6 + wave * 8;
        ctx.shadowColor = `hsl(${hue}, 100%, 75%)`;
        ctx.fillText(ch, x, y);
      });
      tick++;
      requestAnimationFrame(drawHeart);
    }
    drawHeart();

    /* ── Particles ── */
    const pc   = document.getElementById('pc');
    const pctx = pc.getContext('2d');
    function resizePC() { pc.width = window.innerWidth; pc.height = window.innerHeight; }
    resizePC();
    window.addEventListener('resize', resizePC);

    const parts = Array.from({ length: 55 }, () => ({
      x: Math.random() * window.innerWidth,
      y: Math.random() * window.innerHeight,
      r: Math.random() * 2 + 0.5,
      vy: -(Math.random() * 0.5 + 0.15),
      vx: (Math.random() - 0.5) * 0.3,
      phase: Math.random() * Math.PI * 2,
      hue: 310 + Math.random() * 60,
    }));

    function drawParticles() {
      const w = pc.width, h = pc.height;
      pctx.clearRect(0, 0, w, h);
      parts.forEach(p => {
        p.phase += 0.018;
        p.y += p.vy;
        p.x += p.vx + Math.sin(p.phase) * 0.25;
        if (p.y < -5) { p.y = h + 5; p.x = Math.random() * w; }
        const alpha = Math.max(0, 0.2 + Math.sin(p.phase) * 0.25);
        pctx.save();
        pctx.globalAlpha = alpha;
        pctx.shadowBlur  = 10;
        pctx.shadowColor = `hsl(${p.hue}, 90%, 80%)`;
        pctx.fillStyle   = `hsl(${p.hue}, 90%, 80%)`;
        pctx.beginPath();
        pctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        pctx.fill();
        pctx.restore();
      });
      requestAnimationFrame(drawParticles);
    }
    drawParticles();
  </script>
