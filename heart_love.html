<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>I Love You ❤</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: radial-gradient(ellipse at 50% 40%, #1a0015 0%, #0a0008 70%, #030002 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: Georgia, serif;
    }

    #wrapper {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #hc {
      display: block;
      animation: heartbeat 1.8s ease-in-out infinite;
      position: relative;
      z-index: 2;
    }

    #pc {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      14%       { transform: scale(1.07); }
      28%       { transform: scale(1); }
      42%       { transform: scale(1.04); }
      56%       { transform: scale(1); }
    }
  </style>
</head>
<body>

  <canvas id="pc"></canvas>

  <div id="wrapper">
    <canvas id="hc"></canvas>
  </div>

  <script>
    /* ── Heart canvas ── */
    const hc  = document.getElementById('hc');
    const ctx = hc.getContext('2d');
    const W = 520, H = 500;
    hc.width  = W;
    hc.height = H;

    /* Heart equation — (x²+y²−1)³ − x²y³ ≤ 0
       Standard orientation: top two bumps, point at bottom.
       We flip ny sign so positive ny goes downward → bumps on top. */
    function isInHeart(px, py) {
      const nx =  (px - W / 2)          / (W * 0.38);
      /* flip y: subtract from center then negate so +ny = up in math coords */
      const ny = -(py - H / 2 - H * 0.04) / (H * 0.37);
      const val = Math.pow(nx*nx + ny*ny - 1, 3) - nx*nx * Math.pow(ny, 3);
      return val <= 0;
    }

    const phrase = "I love you ";
    let   pIdx   = 0;

    const fontSize = 8.5;
    const colW     = 7.8;
    const rowH     = 11;
    const cols     = Math.floor(W / colW);
    const rows     = Math.floor(H / rowH);

    const cells = [];

    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const cx = c * colW + colW / 2;
        const cy = r * rowH + rowH / 2;
        if (isInHeart(cx, cy)) {
          const ch = phrase[pIdx % phrase.length];
          pIdx++;
          cells.push({ x: cx, y: cy + fontSize * 0.35, ch: ch === ' ' ? '' : ch, r, c });
        }
      }
    }

    let tick = 0;
    function drawHeart() {
      ctx.clearRect(0, 0, W, H);
      ctx.font      = `bold ${fontSize}px Georgia, serif`;
      ctx.textAlign = 'center';

      cells.forEach(({ x, y, ch, r, c }) => {
        if (!ch) return;
        const wave  = Math.sin(tick * 0.05 + c * 0.22 + r * 0.18);
        const hue   = 330 + wave * 30;
        const sat   = 85  + wave * 10;
        const light = 62  + wave * 18;
        const alpha = 0.75 + wave * 0.25;

        ctx.fillStyle  = `hsla(${hue}, ${sat}%, ${light}%, ${alpha})`;
        ctx.shadowBlur  = 6 + wave * 8;
        ctx.shadowColor = `hsl(${hue}, 100%, 75%)`;
        ctx.fillText(ch, x, y);
      });

      tick++;
      requestAnimationFrame(drawHeart);
    }
    drawHeart();

    /* ── Particle canvas ── */
    const pc   = document.getElementById('pc');
    const pctx = pc.getContext('2d');

    function resizePC() {
      pc.width  = window.innerWidth;
      pc.height = window.innerHeight;
    }
    resizePC();
    window.addEventListener('resize', resizePC);

    const parts = Array.from({ length: 55 }, () => ({
      x:     Math.random() * window.innerWidth,
      y:     Math.random() * window.innerHeight,
      r:     Math.random() * 2 + 0.5,
      vy:   -(Math.random() * 0.5 + 0.15),
      vx:    (Math.random() - 0.5) * 0.3,
      phase: Math.random() * Math.PI * 2,
      hue:   310 + Math.random() * 60,
    }));

    function drawParticles() {
      const w = pc.width, h = pc.height;
      pctx.clearRect(0, 0, w, h);
      parts.forEach(p => {
        p.phase += 0.018;
        p.y     += p.vy;
        p.x     += p.vx + Math.sin(p.phase) * 0.25;
        if (p.y < -5) { p.y = h + 5; p.x = Math.random() * w; }

        const alpha = Math.max(0, 0.2 + Math.sin(p.phase) * 0.25);
        pctx.save();
        pctx.globalAlpha  = alpha;
        pctx.shadowBlur   = 10;
        pctx.shadowColor  = `hsl(${p.hue}, 90%, 80%)`;
        pctx.fillStyle    = `hsl(${p.hue}, 90%, 80%)`;
        pctx.beginPath();
        pctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        pctx.fill();
        pctx.restore();
      });
      requestAnimationFrame(drawParticles);
    }
    drawParticles();
  </script>
</body>
</html>
